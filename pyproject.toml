[tool.robotpy]
robotpy_version = "2026.2.2"
requires = [
    "robotpy-commands-v2==2026.2.2",
    "phoenix6==26.1.1",
    "robotpy-cscore==2026.2.2",
    "limelightlib-python>=0.9.6",
    "robotpy-pathplannerlib",
]

# Directories and files to exclude from deploy to the RoboRIO.
# This keeps sim-only, test, and docs files off the robot.
robotpy_excludes = [
    "tests",
    "docs",
    "scripts",
    "calibration",
    "ctre_sim",
    "testing",
    "logs",
    "hardware/mock_motor_controller.py",
    "constants/simulation.py",
]
